<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Puzzle Connect Game</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #222;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      #game {
        display: grid;
        grid-template-columns: repeat(5, 60px);
        grid-template-rows: repeat(5, 60px);
        gap: 5px;
      }
      .tile {
        width: 60px;
        height: 60px;
        background: #444;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        border-radius: 8px;
        transition: transform 0.2s;
      }
      .tile:hover {
        transform: scale(1.1);
      }
      .pipe {
        width: 40px;
        height: 10px;
        background: #0f0;
      }
      .vertical {
        width: 10px;
        height: 40px;
      }
      .corner {
        width: 40px;
        height: 40px;
        border: 10px solid #0f0;
        border-top: none;
        border-left: none;
        box-sizing: border-box;
      }
      .source {
        background: #f00;
      }
      .target {
        background: #00f;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>

    <script>
      const game = document.getElementById("game");
      const size = 5;

      // Define tile types
      const types = ["pipe", "vertical", "corner"];

      function createTile(type) {
        const tile = document.createElement("div");
        tile.classList.add("tile");
        const piece = document.createElement("div");
        piece.classList.add(type);
        tile.appendChild(piece);

        // Rotate tile on click
        let rotation = 0;
        tile.addEventListener("click", () => {
          rotation = (rotation + 90) % 360;
          tile.style.transform = `rotate(${rotation}deg)`;
        });

        return tile;
      }

      // Build grid
      for (let i = 0; i < size * size; i++) {
        let type = types[Math.floor(Math.random() * types.length)];
        let tile = createTile(type);
        if (i === 0) tile.classList.add("source");
        if (i === size * size - 1) tile.classList.add("target");
        game.appendChild(tile);
      }
    </script>
  </body>
</html>
